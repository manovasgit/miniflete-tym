<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8b0000">
  <meta name="description" content="Gestión de planilla diaria de unidades – Miniflete TyM">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Unidades TyM">
  <title>Unidades – Miniflete TyM</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
  <!-- Header -->
  <header id="header">
    <div class="header-content" style="display:flex;align-items:center;gap:10px">
      <img src="../icons/logo.png" alt="" aria-hidden="true"
           style="height:32px;width:32px;border-radius:50%;object-fit:contain"
           onerror="this.style.display='none'">
      <h1>Unidades <span class="header-sub">Miniflete TyM</span></h1>
    </div>
  </header>

  <!-- Main content (rendered by app.js) -->
  <main id="main" role="main">
    <div style="text-align:center;padding:60px 0;color:#666;font-size:.9rem">Cargando…</div>
  </main>

  <!-- Bottom navigation -->
  <nav id="bottom-nav" role="navigation" aria-label="Navegación principal">
    <button class="nav-btn active" data-tab="carga" aria-label="Carga del día">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <span>Carga</span>
    </button>

    <button class="nav-btn" data-tab="dia" aria-label="Resumen del día">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Día</span>
    </button>

    <button class="nav-btn" data-tab="historial" aria-label="Historial por unidad">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <span>Historial</span>
    </button>

    <button class="nav-btn" data-tab="mensual" aria-label="Resumen mensual">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6"  y1="20" x2="6"  y2="14"/>
        <line x1="2"  y1="20" x2="22" y2="20"/>
      </svg>
      <span>Mensual</span>
    </button>
  </nav>
</div>

<!-- Service form modal (bottom sheet) -->
<div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Agregar servicio</h2>
      <button id="modal-close" class="btn-icon" aria-label="Cerrar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="scott-hint" style="display:none"></div>
      <form id="service-form" novalidate>
        <input type="hidden" id="f-id">

        <div class="field">
          <label for="f-camioneta">Precio camioneta <span class="req">*</span></label>
          <div class="input-money">
            <span class="money-prefix">$</span>
            <input type="number" id="f-camioneta" inputmode="numeric" placeholder="0" min="0" required autocomplete="off">
          </div>
          <div id="f-preview" class="ganancia-preview hidden"></div>
        </div>

        <div class="field">
          <label for="f-adicionales">Adicionales</label>
          <div class="field-hint">Peones, escalera, etc. — solo informativo, no entra en comisión</div>
          <div class="input-money">
            <span class="money-prefix">$</span>
            <input type="number" id="f-adicionales" inputmode="numeric" placeholder="0" min="0" autocomplete="off">
          </div>
        </div>

        <div class="field">
          <label for="f-obs">Observaciones</label>
          <input type="text" id="f-obs" placeholder="Ej: mudanza 3 ambientes, piso 5 sin ascensor…" maxlength="200" autocomplete="off">
        </div>

        <div class="modal-actions">
          <button type="button" id="btn-cancel" class="btn-secondary">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast" role="status" aria-live="polite"></div>

<script src="storage.js"></script>
<script src="calculations.js"></script>
<script src="app.js"></script>

</body>
</html>
