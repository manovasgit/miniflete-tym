<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#8B0000">
  <meta name="description" content="Gestión operativa de unidades – Miniflete TyM">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Unidades">
  <title>Unidades – Miniflete TyM</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
  <header id="header">
    <h1>Miniflete TyM</h1>
  </header>

  <main id="main" role="main">
    <div class="loading">Cargando…</div>
  </main>

  <nav id="bottom-nav" role="navigation" aria-label="Navegación principal">
    <button class="nav-btn active" data-tab="agenda">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Agenda</span>
    </button>

    <button class="nav-btn" data-tab="nuevo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span>Nuevo</span>
    </button>

    <button class="nav-btn" data-tab="resumen">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>Día</span>
    </button>

    <button class="nav-btn" data-tab="caja">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
      </svg>
      <span>Caja</span>
    </button>
  </nav>
</div>

<!-- Overlay (detalle, comanda, editar) -->
<div id="overlay" class="hidden" role="dialog" aria-modal="true">
  <div id="overlay-content"></div>
</div>

<!-- Toast -->
<div id="toast" role="status" aria-live="polite"></div>

<script src="storage.js"></script>
<script src="calculations.js"></script>
<script src="comanda.js"></script>
<script src="sheets.js"></script>
<script src="app.js"></script>
  <script>
      if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js');
      }
        </script>
</body>
</html>
