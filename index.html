<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8b0000">
  <meta name="description" content="Generador de presupuestos - Miniflete TyM">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Miniflete TyM">
  <title>Miniflete TyM – Presupuestos</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">
  <header id="header">
    <div class="header-content">
      <img id="header-logo" src="icons/logo.png" alt="Logo Miniflete TyM"
        style="height:36px;width:36px;object-fit:contain;border-radius:50%;display:none">
      <h1 id="page-title">Miniflete TyM</h1>
    </div>
  </header>

  <main id="main-content" role="main">
    <div class="view-pad" style="text-align:center;padding-top:60px">
      <div style="font-size:2.5rem;margin-bottom:12px">🚚</div>
      <div style="color:#666;font-size:.9rem">Cargando...</div>
    </div>
  </main>

  <nav id="bottom-nav" role="navigation" aria-label="Navegación principal">
    <button class="nav-item active" data-view="form" aria-label="Nuevo presupuesto">
      <span class="nav-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </span>
      <span class="nav-label">Nuevo</span>
    </button>

    <button class="nav-item" data-view="history" aria-label="Historial">
      <span class="nav-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </span>
      <span class="nav-label">Historial</span>
    </button>

    <button class="nav-item" data-view="settings" aria-label="Configuración">
      <span class="nav-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </span>
      <span class="nav-label">Tarifas</span>
    </button>
  </nav>
</div>

<!-- Install banner -->
<div id="install-banner" class="hidden">
  <span class="install-text">🚚 Instalá la app en tu celular</span>
  <button id="btn-install">Instalar</button>
  <button id="btn-install-close" aria-label="Cerrar">✕</button>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
  // Show header logo once loaded
  document.addEventListener('DOMContentLoaded', function() {
    var logo = document.getElementById('header-logo');
    if (logo) {
      logo.onload = function() { logo.style.display = 'block'; };
      if (logo.complete) logo.style.display = 'block';
    }
  });
</script>
<script src="js/storage.js"></script>
<script src="js/pricing.js"></script>
<script src="js/app.js"></script>

</body>
</html>
