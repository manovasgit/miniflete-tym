<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8b0000">
  <meta name="description" content="Generador de propuestas comerciales - Miniflete TyM">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Miniflete TyM">
  <title>Miniflete TyM – Propuestas</title>
  <link rel="manifest" href="manifest.json">
  <!-- iOS icon -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

<div id="app">
  <header id="header">
    <div class="header-content">
      <button id="btn-back" class="btn-icon hidden" aria-label="Volver">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div id="header-title-wrap" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px">
        <img id="header-logo" src="icons/logo.png" alt="Logo Miniflete TyM"
          style="height:38px;width:38px;object-fit:contain;border-radius:50%;display:none">
        <h1 id="page-title">Miniflete TyM</h1>
      </div>
      <div style="width:40px"></div>
    </div>
  </header>

  <main id="main-content" role="main">
    <!-- Rendered by app.js -->
    <div class="view-pad" style="text-align:center;padding-top:60px">
      <div style="font-size:2rem;margin-bottom:12px">🚛</div>
      <div style="color:#666;font-size:.9rem">Cargando...</div>
    </div>
  </main>

  <nav id="bottom-nav" role="navigation" aria-label="Navegación principal">
    <button class="nav-item active" data-view="home" aria-label="Inicio">
      <span class="nav-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </span>
      <span class="nav-label">Inicio</span>
    </button>

    <button class="nav-item" data-view="history" aria-label="Historial">
      <span class="nav-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      <span class="nav-label">Historial</span>
    </button>

    <button class="nav-item fab" data-view="form" aria-label="Nueva propuesta">
      <span class="nav-icon" style="font-size:1.6rem;font-weight:300;line-height:1" aria-hidden="true">+</span>
    </button>

    <button class="nav-item" data-view="stats" aria-label="Estadísticas">
      <span class="nav-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
        </svg>
      </span>
      <span class="nav-label">Stats</span>
    </button>

    <button class="nav-item" data-view="settings" aria-label="Configuración">
      <span class="nav-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </span>
      <span class="nav-label">Config</span>
    </button>
  </nav>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<!-- jsPDF from CDN — cargado con fallback silencioso -->
<script>
  (function() {
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onerror = function() { console.info('jsPDF CDN no disponible – usando modo impresión'); };
    document.head.appendChild(s);
  })();
</script>

<link rel="stylesheet" href="css/styles.css">
<script>
  // Show header logo once it loads
  document.addEventListener('DOMContentLoaded', function() {
    var logo = document.getElementById('header-logo');
    if (logo) {
      logo.onload = function() { logo.style.display = 'block'; };
      // Force onload if already cached
      if (logo.complete) logo.style.display = 'block';
    }
  });
</script>
<script src="js/storage.js"></script>
<script src="js/pricing.js"></script>
<script src="js/pdf-generator.js"></script>
<script src="js/app.js"></script>

</body>
</html>
